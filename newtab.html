<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <title>Neuer Tab</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true" focusable="false">
      <symbol id="icon-search" viewBox="0 0 24 24">
        <path d="M10.8 18.2a7.4 7.4 0 1 1 5.2-2.15l4.05 4.05-1.42 1.42-4.05-4.05a7.35 7.35 0 0 1-3.78.73Zm0-2a5.4 5.4 0 1 0 0-10.8 5.4 5.4 0 0 0 0 10.8Z"></path>
      </symbol>
      <symbol id="icon-gear" viewBox="0 0 24 24">
        <path d="M10.77 22 10.3 18.9a7.53 7.53 0 0 1-1.57-.65l-2.53 1.86-2.11-2.1 1.86-2.54a8.11 8.11 0 0 1-.65-1.57L2.2 13.43v-2.98l3.1-.47c.17-.55.39-1.08.65-1.58L4.09 5.88l2.1-2.11L8.73 5.63c.5-.26 1.02-.48 1.57-.65l.47-3.1h2.98l.47 3.1c.55.17 1.08.39 1.58.65l2.52-1.86 2.11 2.11-1.86 2.52c.26.5.48 1.03.65 1.58l3.1.47v2.98l-3.1.47a8.11 8.11 0 0 1-.65 1.57l1.86 2.53-2.11 2.1-2.52-1.85c-.5.26-1.03.48-1.58.65L13.75 22h-2.98Zm1.49-6.35a3.7 3.7 0 1 0 0-7.4 3.7 3.7 0 0 0 0 7.4Z"></path>
      </symbol>
      <symbol id="icon-pin" viewBox="0 0 24 24">
        <path d="m13.1 2 8.45 8.45-1.42 1.41-1.41-.7-4.25 4.25.7 3.54-1.41 1.41-4.95-4.95-5.66 5.66-1.42-1.41 5.66-5.66-4.95-4.95 1.41-1.41 3.54.7 4.25-4.25-.7-1.41L13.1 2Z"></path>
      </symbol>
      <symbol id="icon-plus" viewBox="0 0 24 24">
        <path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6V5Z"></path>
      </symbol>
      <symbol id="icon-trash" viewBox="0 0 24 24">
        <path d="M8 4V2h8v2h5v2H3V4h5Zm-2 4h12l-.75 13H6.75L6 8Zm3.9 2 .35 9h1.6l-.2-9H9.9Zm4.25 0-.2 9h1.6l.35-9h-1.75Z"></path>
      </symbol>
      <symbol id="icon-image" viewBox="0 0 24 24">
        <path d="M4 4h16v16H4V4Zm2 2v10.2l3.25-3.25 2.25 2.25 4.2-4.2L18 13.3V6H6Zm0 12h12v-1.85l-2.3-2.3-4.2 4.2-2.25-2.25L6 18Zm3.3-7.2a1.8 1.8 0 1 0 0-3.6 1.8 1.8 0 0 0 0 3.6Z"></path>
      </symbol>
      <symbol id="icon-close" viewBox="0 0 24 24">
        <path d="m6.35 5 5.66 5.66L17.66 5l1.42 1.41-5.66 5.66 5.66 5.66-1.42 1.41-5.65-5.65-5.66 5.65-1.41-1.41 5.65-5.66-5.65-5.66L6.35 5Z"></path>
      </symbol>
    </svg>

    <div id="backgroundLayer" class="background-layer"></div>
    <div class="readability-overlay"></div>

    <main class="page-shell" aria-live="polite">
      <header class="topbar">
        <time id="clock" class="clock" aria-label="Aktuelle Uhrzeit">--:--</time>
        <button id="settingsButton" class="icon-button settings-trigger" type="button" aria-label="Einstellungen oeffnen" title="Einstellungen">
          <svg aria-hidden="true"><use href="#icon-gear"></use></svg>
        </button>
      </header>

      <section class="search-zone" aria-label="Suche">
        <form id="searchForm" class="search-shell" autocomplete="off">
          <label class="visually-hidden" for="searchInput">Suchbegriff</label>
          <svg class="search-icon" aria-hidden="true"><use href="#icon-search"></use></svg>
          <input id="searchInput" type="search" inputmode="search" placeholder="Im Web suchen" autocomplete="off" spellcheck="false">
          <div id="searchProviders" class="search-engines" role="group" aria-label="Suchanbieter"></div>
        </form>
      </section>

      <section id="pinnedSection" class="content-section pinned-section adaptive-content" aria-label="Angepinnt" hidden>
        <div class="section-heading">
          <h2>Angepinnt</h2>
        </div>
        <div id="pinnedGrid" class="tile-grid pinned-grid"></div>
      </section>

      <div class="content-stack optional-content adaptive-content">
        <section id="quickSection" class="content-section" aria-label="Schnellzugriff" hidden>
          <div class="section-heading">
            <h2>Schnellzugriff</h2>
          </div>
          <div id="quickGrid" class="tile-grid"></div>
        </section>
      </div>

    </main>

    <div id="panelBackdrop" class="panel-backdrop" hidden></div>
    <aside id="settingsPanel" class="settings-panel" aria-hidden="true" aria-labelledby="settingsTitle">
      <div class="settings-header">
        <div>
          <p class="settings-kicker">New Tab</p>
          <h2 id="settingsTitle">Einstellungen</h2>
        </div>
        <button id="closeSettingsButton" class="icon-button" type="button" aria-label="Einstellungen schliessen" title="Schliessen">
          <svg aria-hidden="true"><use href="#icon-close"></use></svg>
        </button>
      </div>

      <div class="settings-body">
        <section class="settings-group" aria-labelledby="appearanceTitle">
          <h3 id="appearanceTitle">Darstellung</h3>
          <label class="field-row" for="themeSelect">
            <span>Theme</span>
            <select id="themeSelect">
              <option value="dark">Dunkel</option>
              <option value="light">Hell</option>
            </select>
          </label>
          <label class="switch-row">
            <span>Fokusmodus</span>
            <input id="focusModeToggle" type="checkbox">
          </label>
          <label class="switch-row">
            <span>Standard-Kacheln</span>
            <input id="defaultTilesToggle" type="checkbox">
          </label>
        </section>

        <section class="settings-group" aria-labelledby="searchButtonsTitle">
          <h3 id="searchButtonsTitle">Suchbuttons</h3>
          <form id="searchProviderForm" class="provider-form">
            <label class="visually-hidden" for="providerLabelInput">Name</label>
            <input id="providerLabelInput" type="text" maxlength="14" placeholder="Name">
            <label class="visually-hidden" for="providerUrlInput">Such-URL</label>
            <input id="providerUrlInput" type="text" placeholder="https://example.com/search?q={query}">
            <button class="compact-button" type="submit">
              <svg aria-hidden="true"><use href="#icon-plus"></use></svg>
              <span>Hinzufuegen</span>
            </button>
          </form>
          <p class="settings-note">Maximal drei Buttons. Nutze <code>{query}</code> als Platzhalter.</p>
          <div id="searchProviderList" class="provider-list"></div>
        </section>

        <section class="settings-group" aria-labelledby="backgroundTitle">
          <h3 id="backgroundTitle">Hintergruende</h3>
          <label class="field-row" for="backgroundModeSelect">
            <span>Bildwechsel</span>
            <select id="backgroundModeSelect">
              <option value="random">Zufaellig</option>
              <option value="daily">Taeglich</option>
              <option value="fixed">Festes Bild</option>
            </select>
          </label>
          <div class="upload-row">
            <label class="file-button">
              <svg aria-hidden="true"><use href="#icon-image"></use></svg>
              <span>Bilder importieren</span>
              <input id="imageFileInput" type="file" accept="image/*" multiple>
            </label>
          </div>
          <form id="imageUrlForm" class="inline-form">
            <label class="visually-hidden" for="imageUrlInput">Bild-URL</label>
            <input id="imageUrlInput" type="url" placeholder="https://beispiel.de/bild.jpg">
            <button class="compact-button" type="submit">
              <svg aria-hidden="true"><use href="#icon-plus"></use></svg>
              <span>URL</span>
            </button>
          </form>
          <div id="backgroundList" class="background-list" aria-label="Gespeicherte Bilder"></div>
        </section>

        <section class="settings-group" aria-labelledby="shortcutsTitle">
          <h3 id="shortcutsTitle">Eigene Shortcuts</h3>
          <form id="shortcutForm" class="shortcut-form">
            <label class="visually-hidden" for="shortcutNameInput">Name</label>
            <input id="shortcutNameInput" type="text" maxlength="36" placeholder="Name">
            <label class="visually-hidden" for="shortcutUrlInput">URL</label>
            <input id="shortcutUrlInput" type="text" placeholder="https://example.com">
            <label class="file-button icon-file-button">
              <svg aria-hidden="true"><use href="#icon-image"></use></svg>
              <span>Icon</span>
              <input id="shortcutIconInput" type="file" accept="image/*">
            </label>
            <button class="compact-button" type="submit">
              <svg aria-hidden="true"><use href="#icon-plus"></use></svg>
              <span>Hinzufuegen</span>
            </button>
          </form>
          <div id="shortcutList" class="shortcut-list"></div>
        </section>

        <section class="settings-group" aria-labelledby="quickIconsTitle">
          <h3 id="quickIconsTitle">Standard-Icons</h3>
          <p class="settings-note">Ersetzt die Icons der festen Schnellzugriffe lokal durch eigene Bilddateien.</p>
          <div id="defaultTileIconList" class="icon-override-list"></div>
        </section>

        <section class="settings-group danger-zone" aria-labelledby="dataTitle">
          <h3 id="dataTitle">Daten</h3>
          <button id="resetButton" class="danger-button" type="button">Alle lokalen Daten zuruecksetzen</button>
        </section>
      </div>
    </aside>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
